<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUROPE TRAVEL JOURNAL</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcf8;
            --text-main: #2c2c2c;
            --text-muted: #737373;
            --accent: #9f8166;
            --border: #eae8e1;
            --font-serif: 'Noto Serif SC', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            line-height: 1.8;
            font-weight: 300;
            overflow-x: hidden;
        }

        /* Progress Bar (Dynamic) */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--accent);
            z-index: 1000;
            width: 0%;
            transition: width 0.1s ease;
        }

        /* Interactive Links */
        .keyword-link {
            position: relative;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dashed var(--accent);
            transition: all 0.3s ease;
        }

        .keyword-link:hover {
            color: var(--accent);
            background: rgba(159, 129, 102, 0.1);
            padding: 0 4px;
            border-radius: 4px;
        }

        .keyword-link::after {
            content: '↗';
            font-size: 0.7em;
            margin-left: 2px;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s ease;
            position: absolute;
            transform: translateY(-2px);
        }

        .keyword-link:hover::after {
            opacity: 1;
        }

        /* Hero Section (Parallax ready) */
        .hero {
            height: 65vh;
            min-height: 500px;
            background: url('https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .hero-content .label {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
            opacity: 0.9;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0 0 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .hero p {
            font-size: 1.05rem;
            font-weight: 300;
            letter-spacing: 1px;
            max-width: 650px;
            margin: 0 auto;
            opacity: 0.9;
        }

        /* Navigation (Sticky & Interactive) */
        .nav {
            position: sticky;
            top: 0;
            background: rgba(253, 252, 248, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
            padding: 18px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 30px;
            overflow-x: auto;
        }

        .nav a {
            text-decoration: none;
            color: var(--text-main);
            font-family: var(--font-serif);
            font-size: 1.1rem;
            transition: color 0.3s, transform 0.3s;
            white-space: nowrap;
        }

        .nav a:hover {
            color: var(--accent);
            transform: translateY(-2px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 25px;
        }

        /* Reveal Animations */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Prep Section */
        .prep-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin: 60px 0;
        }

        .prep-card {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            transition: background 0.4s ease, box-shadow 0.4s ease;
            padding: 25px;
            border-radius: 8px;
        }

        .prep-card:hover {
            background: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            transform: translateY(-3px);
        }

        .prep-card h3 {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin: 0 0 15px;
        }

        .prep-card p {
            font-size: 0.95rem;
            margin: 0;
        }

        /* Country Header */
        .country-header {
            margin: 100px 0 60px;
            text-align: center;
        }

        .country-header .label {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .country-header h2 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            margin: 10px 0 15px;
            color: var(--text-main);
            transition: transform 0.5s ease;
        }

        .country-header:hover h2 {
            transform: scale(1.02);
        }

        .country-header .theme {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-style: italic;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        .country-header .strategy {
            text-align: left;
            background: #fff;
            padding: 35px;
            border: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.8;
            position: relative;
            transition: box-shadow 0.4s ease;
            border-radius: 4px;
        }

        .country-header .strategy:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .country-header .strategy::before {
            content: 'STRATEGY';
            position: absolute;
            top: -10px;
            left: 30px;
            background: #fff;
            padding: 0 10px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--accent);
        }

        /* Day Card */
        .day-card {
            margin-bottom: 80px;
        }

        /* Country Hero Image */
        .country-hero-container {
            margin: 40px 0 60px;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            height: 300px;
        }

        .country-hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(10%) contrast(95%);
            transition: transform 2s ease, filter 1s ease;
        }

        .country-hero-container:hover .country-hero-image {
            transform: scale(1.05);
            filter: sepia(0) contrast(105%);
        }

        .day-header h3 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            margin: 0 0 10px;
            color: var(--text-main);
            font-weight: 600;
        }

        .day-header .meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: block;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        /* Timeline Interactive */
        .timeline {
            margin-bottom: 35px;
        }

        .timeline-item {
            display: flex;
            margin-bottom: 18px;
            align-items: baseline;
            transition: transform 0.3s ease;
        }

        .timeline-item:hover {
            transform: translateX(8px);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(159, 129, 102, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(159, 129, 102, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(159, 129, 102, 0);
            }
        }

        .timeline-item .time {
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
            min-width: 70px;
            position: relative;
        }

        .timeline-item .time::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 8px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        .timeline-item .text {
            font-size: 1rem;
            color: var(--text-main);
            margin-left: 25px;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            background: #fff;
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            transition: box-shadow 0.4s ease;
            border-radius: 8px;
        }

        .info-grid:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-item .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .info-item .content {
            font-size: 0.95rem;
        }

        /* Tips Block */
        .tips-block {
            padding: 20px;
            border: 1px solid rgba(159, 129, 102, 0.2);
            background: rgba(159, 129, 102, 0.03);
            border-radius: 8px;
            transition: background 0.4s ease;
        }

        .tips-block:hover {
            background: rgba(159, 129, 102, 0.06);
        }

        .tips-block p {
            margin: 0 0 12px;
            font-size: 0.9rem;
            color: #5c5c5c;
        }

        .tips-block p:last-child {
            margin-bottom: 0;
        }

        .tips-block strong {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-right: 5px;
        }

        @media (min-width: 768px) {
            .hero {
                background-attachment: fixed;
            }

            /* Hardware accelerated parallax */
            .hero h1 {
                font-size: 4.5rem;
            }

            .prep-section {
                grid-template-columns: 1fr 1fr;
                gap: 40px;
            }

            .country-hero-container {
                height: 400px;
            }

            .info-grid {
                grid-template-columns: 1fr 1fr;
            }

            .info-item.full {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>

                                { time: "白天", text: "途经007取景地格伦科峡谷，看高地长毛牛。抵深邃尼斯湖寻找水怪。" },
                                { time: "傍晚", text: "返回市区解散。" },
                                { time: "晚上", text: "钻进有现场音乐的地下威士忌酒馆品鉴。" }
                            ], transport: "报名当地团，坐舒适中巴听司机讲神话。", food: "晚上点正宗苏格兰单一麦芽威士忌 (推荐泥煤风味)。", tips: ["BOOKING: 高地一日团提前官网预订。", "WEATHER: 极易下雨，必须穿防风防水冲锋衣，雨伞会被妖风吹折。", "SKIP: 晚上酒馆（高地回来晚，可早点回房收拾行李）。"]
                        },
                        {
                            day: "Day 22", date: "6/18", city: "离开", timeline: [
                                { time: "上午", text: "皇家一英里羊毛店扫货，买100%纯羊绒围巾和黄油饼干伴手礼。" },
                                { time: "下午", text: "飞回国内，或赴伦敦离境。结束跨越半个欧洲的史诗级拉练！" }
                            ], transport: "市中心乘 Airlink 100 蓝色大巴，30分钟直达机场。", food: "机场内解决。", tips: ["INFO: 英国已全面取消海外游客退税！无需在机场排队退税。", "SKIP: 纪念品采购（直接去机场免税店买，省去打包麻烦）。"]
                        }
                    ]
                }
            ]
        };

        const app = document.getElementById('app');

        let html = `
            <div class="hero">
                <div class="hero-content">
                    <span class="label reveal">Epic Journey</span>
                    <h1 class="reveal">${itinerary.title}</h1>
                    <p class="reveal">${itinerary.subtitle} · ${itinerary.route}</p>
                </div>
            </div>
            
            <div class="nav">
                ${itinerary.countries.map(c => `<a href="#${c.id}">${c.name}</a>`).join('')}
            </div>
            
            <div class="container">
                <div class="prep-section">
                    ${itinerary.prep.map(p => `
                        <div class="prep-card reveal">
                            <h3>${p.label}</h3>
                            <p>${processText(p.desc)}</p>
                        </div>
                    `).join('')}
                </div>
        `;

        itinerary.countries.forEach(country => {
            html += `
                <section id="${country.id}" class="country-section">
                    <div class="country-header reveal">
                        <span class="label">Destination</span>
                        <h2>${country.name}</h2>
                        <p class="theme">${country.theme}</p>
                        <div class="strategy">${processText(country.strategy)}</div>
                    </div>
                    
                    <div class="country-hero-container reveal">
                        <img src="${countryImages[country.id]}" alt="${country.name}" class="country-hero-image" loading="lazy" onerror="this.onerror=null; this.src='${fallbackImg}';">
                    </div>
            `;

            country.days.forEach(day => {
                html += `
                    <div class="day-card reveal">
                        <div class="day-content">
                            <div class="day-header">
                                <h3>${day.day}</h3>
                                <span class="meta">${day.date} — ${day.city}</span>
                            </div>
                            
                            <div class="timeline">
                                ${day.timeline.map(t => `
                                    <div class="timeline-item">
                                        <span class="time">${t.time}</span>
                                        <span class="text">${processText(t.text)}</span>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="info-grid">
                                ${day.transport ? `<div class="info-item full"><span class="label">Transport</span><span class="content">${processText(day.transport)}</span></div>` : ''}
                                ${day.food ? `<div class="info-item"><span class="label">Dining</span><span class="content">${processText(day.food)}</span></div>` : ''}
                                ${day.hotel ? `<div class="info-item"><span class="label">Stay</span><span class="content">${processText(day.hotel)}</span></div>` : ''}
                            </div>
                            
                            <div class="tips-block">
                                ${day.tips.map(tip => {
                    let formatted = tip.replace(/^([A-Z\s]+):/, '<strong>$1:</strong>');
                    return `<p>${processText(formatted)}</p>`;
                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</section>`;
        });

        html += `
            <div style="text-align: center; padding: 60px 0; border-top: 1px solid var(--border); margin-top: 40px;" class="reveal">
                <p style="font-family: var(--font-serif); font-size: 1.5rem; font-style: italic; color: var(--text-muted);">Bon Voyage</p>
            </div>
            </div>
        `;

        app.innerHTML = html;

        // PROGRESS BAR
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('progress-bar').style.width = scrolled + '%';
        });

        // SMOOTH SCROLL NAV
        document.querySelectorAll('.nav a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    const offset = 80;
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = targetElement.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;

                    window.scrollTo({
                        top: elementPosition - offset,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // INTERSECTION OBSERVER FOR REVEAL ANIMATIONS
        setTimeout(() => {
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        obs.unobserve(entry.target); // Reveal only once
                    }
                });
            }, { threshold: 0.05, rootMargin: "0px 0px -10px 0px" });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }, 100);
    </script>
</body>

</html>
